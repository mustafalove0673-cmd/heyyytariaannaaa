<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ariana</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100vh; overflow: hidden; background: #000000; }
body { display: flex; align-items: center; justify-content: center; }

canvas { position: fixed; inset: 0; z-index: 1; }

.status {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-family: 'Courier New', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(168, 85, 247, 0.25);
  text-align: center;
  pointer-events: none;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="status" id="status">tıkla ve konuş</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', () => { resize(); initParticles(); });

// Particles
let particles = [];
const NUM = 260;

function initParticles() {
  particles = [];
  for (let i = 0; i < NUM; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      baseX: 0,
      baseY: 0,
      vx: 0,
      vy: 0,
      size: Math.random() * 1.2 + 0.4,
      opacity: Math.random() * 0.3 + 0.08,
      phase: Math.random() * Math.PI * 2,
      orbitR: Math.random() * 35 + 8,
      orbitSpeed: (Math.random() - 0.5) * 0.005,
      orbitAngle: Math.random() * Math.PI * 2,
      hue: 168 + (Math.random() - 0.5) * 18,
    });
    particles[i].baseX = particles[i].x;
    particles[i].baseY = particles[i].y;
  }
}
initParticles();

// State
let isListening = false;
let isSpeaking = false;
let voiceLevel = 0;
let targetLevel = 0;
let transcript = '';
let responseText = '';
let responsePhase = 0;
let responseDone = false;
let silenceTimer = 0;

// Mouse
let mouseX = W / 2, mouseY = H / 2;
document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});
document.addEventListener('click', () => {
  if (!isListening && !isSpeaking) startListening();
});

// ===== VOICE ENGINE =====
let recognition = null;
const synthesis = window.speechSynthesis;

function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    status.textContent = 'ses desteklenmiyor';
    return;
  }
  recognition = new SR();
  recognition.lang = 'tr-TR';
  recognition.interimResults = true;
  recognition.continuous = true;
  recognition.maxAlternatives = 1;

  recognition.onresult = e => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    transcript = final || interim;
    silenceTimer = 0;
    if (final && !isSpeaking) {
      processCommand(final.trim());
      recognition.abort();
      recognition = null;
    }
  };

  recognition.onerror = e => {
    if (e.error === 'no-speech' || e.error === 'aborted') {
      silenceTimer++;
      if (silenceTimer > 30 && isListening) {
        stopListening();
      }
      if (isListening) startListening();
      return;
    }
  };

  recognition.onend = () => {
    if (isListening && !isSpeaking) startListening();
  };
}

function startListening() {
  if (isSpeaking) return;
  if (!recognition) initSpeech();
  if (!recognition) return;
  try {
    recognition.start();
    isListening = true;
    status.textContent = 'dinliyorum...';
    transcript = '';
  } catch(e) {
    setTimeout(startListening, 300);
  }
}

function stopListening() {
  isListening = false;
  if (recognition) {
    try { recognition.abort(); } catch(e) {}
    recognition = null;
  }
  if (!isSpeaking) status.textContent = 'tıkla ve konuş';
}

// ===== RESPONSES =====
const responses = {
  saat: () => {
    const n = new Date();
    return `Şu an saat ${String(n.getHours()).padStart(2, '0')}:${String(n.getMinutes()).padStart(2, '0')}.`;
  },
  tarih: () => {
    const days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
    const months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
    const d = new Date();
    return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}.`;
  },
  nasilsin: () => 'İyiyim, sen?',
  kimsin: () => 'Ben Ariana. Yapay zeka asistanıyım.',
  merhaba: () => 'Merhaba.',
  adin: () => 'Adım Ariana.',
  kapat: () => {
    window.speechSynthesis.cancel();
    stopListening();
    status.textContent = 'kapatıldı';
    responseText = '';
    responseDone = true;
    return null;
  },
  default: (t) => {
    return `Anladım. "${t}"`;
  }
};

function processCommand(text) {
  stopListening();
  isSpeaking = true;
  targetLevel = 1;
  status.textContent = 'düşünüyor...';
  responseText = '';
  responseDone = false;
  responsePhase = 0;

  let reply = null;
  const t = text.toLowerCase();

  if (/saat|saati|saat kaç/i.test(t)) reply = responses.saat();
  else if (/tarih|bugün|ayın kaçı/i.test(t)) reply = responses.tarih();
  else if (/nasılsın|naber|n'aber/i.test(t)) reply = responses.nasilsin();
  else if (/kimsin|nesin/i.test(t)) reply = responses.kimsin();
  else if (/merhaba|selam|hey/i.test(t)) reply = responses.merhaba();
  else if (/adın|ismin/i.test(t)) reply = responses.adin;
  else if (/kapat|durdur|exit|çık/i.test(t)) {
    const r = responses.kapat();
    if (!r) return;
    reply = r;
  }
  else reply = responses.default(text);

  if (reply) speak(reply);
}

function speak(text) {
  if (!synthesis) {
    // Fallback - no TTS
    responseText = text;
    responseDone = true;
    isSpeaking = false;
    targetLevel = 0;
    status.textContent = text;
    setTimeout(() => {
      status.textContent = 'tıkla ve konuş';
    }, 2000);
    return;
  }

  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'tr-TR';
  u.rate = 0.92;
  u.pitch = 1.05;

  // Try Turkish voice
  const voices = synthesis.getVoices();
  const trVoice = voices.find(v => v.lang.includes('tr')) ||
                  voices.find(v => v.lang === 'tr-TR') ||
                  voices.find(v => v.name.toLowerCase().includes('turkish'));
  if (trVoice) u.voice = trVoice;

  responseText = text;
  responseDone = false;
  responsePhase = 0;

  u.onend = () => {
    isSpeaking = false;
    targetLevel = 0;
    responseDone = true;
    status.textContent = 'tıkla ve konuş';
    setTimeout(() => {
      if (!isSpeaking && !isListening) startListening();
    }, 1000);
  };
  u.onerror = () => {
    isSpeaking = false;
    targetLevel = 0;
    responseDone = true;
    status.textContent = text;
    setTimeout(() => { status.textContent = 'tıkla ve konuş'; }, 3000);
  };

  synthesis.speak(u);
}

if (synthesis) {
  synthesis.onvoiceschanged = () => synthesis.getVoices();
  synthesis.getVoices();
}

// ===== DRAW =====
let t = 0;

function draw() {
  ctx.clearRect(0, 0, W, H);
  t += 0.008;

  voiceLevel += (targetLevel - voiceLevel) * 0.05;
  responsePhase += 0.015;

  const level = voiceLevel;
  const pulse = Math.sin(t * 2) * 0.08 + 0.92;

  particles.forEach((p, i) => {
    p.orbitAngle += p.orbitSpeed;

    let tx = p.baseX;
    let ty = p.baseY;

    // Voice wave
    if (level > 0) {
      const dx = p.x - W / 2;
      const dy = p.y - H / 2;
      const dist = Math.sqrt(dx * dx + dy * dy) + 1;
      const maxD = Math.min(W, H) * 0.45;

      const wave = Math.sin(dist * 0.016 - t * 6 + p.phase) * level * 85 * pulse;
      const wave2 = Math.sin(dist * 0.007 + t * 2.5) * level * 35;
      const pull = (1 - dist / maxD) * level * 0.5;

      tx += dx / dist * dist * pull * 0.25;
      ty += dy / dist * dist * pull * 0.25;

      const perpX = -dy / dist;
      const perpY = dx / dist;
      tx += perpX * (wave + wave2);
      ty += perpY * (wave + wave2);

      // Response text attraction
      if (responseText) {
        const msgDist = Math.sqrt((p.x - W/2)**2 + (p.y - H/2)**2);
        const msgPull = Math.max(0, 1 - msgDist / (maxD * 1.3)) * level * 0.4;
        tx += (W/2 - p.x) * msgPull;
        ty += (H/2 - p.y) * msgPull;
      }
    }

    // Idle drift
    tx += Math.sin(t * 0.4 + i * 0.25) * 1.5;
    ty += Math.cos(t * 0.35 + i * 0.2) * 1;

    // Mouse
    const mdx = p.x - mouseX;
    const mdy = p.y - mouseY;
    const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
    if (mdist < 100) {
      const push = (1 - mdist / 100) * 20;
      tx += (mdx / mdist) * push;
      ty += (mdy / mdist) * push;
    }

    // Spring
    p.vx += (tx - p.x) * 0.03;
    p.vy += (ty - p.y) * 0.03;
    p.vx *= 0.9;
    p.vy *= 0.9;
    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0) { p.x = 0; p.baseX = 0; }
    if (p.x > W) { p.x = W; p.baseX = W; }
    if (p.y < 0) { p.y = 0; p.baseY = 0; }
    if (p.y > H) { p.y = H; p.baseY = H; }

    let size = p.size * (level > 0 ? (1 + level * 2.2) : 1);
    let alpha = p.opacity + (level > 0 ? level * 0.45 : 0);

    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 65%, 60%, ${Math.min(0.85, alpha)})`;
    ctx.fill();

    if (level > 0.03 || size > 1) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, size * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, 65%, 60%, ${Math.min(0.85, alpha) * 0.05})`;
      ctx.fill();
    }

    // Connections
    if (level > 0.2) {
      for (let j = i + 1; j < particles.length; j += 7) {
        const q = particles[j];
        const d = Math.sqrt((p.x-q.x)**2 + (p.y-q.y)**2);
        if (d < 55 * level) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.strokeStyle = `hsla(${p.hue}, 65%, 60%, ${(1 - d/(55*level)) * 0.1 * level})`;
          ctx.lineWidth = 0.3;
          ctx.stroke();
        }
      }
    }
  });

  // Transcript
  if (transcript && isListening) {
    ctx.font = '10px Courier New';
    ctx.fillStyle = 'rgba(168, 85, 247, 0.25)';
    ctx.textAlign = 'center';
    ctx.fillText(transcript, W/2, H/2 + 70);
  }

  // Response
  if (responseText && isSpeaking) {
    const fadeAlpha = Math.min(0.35, 0.2 + Math.sin(responsePhase) * 0.1);
    ctx.font = '11px Courier New';
    ctx.fillStyle = `rgba(168, 85, 247, ${fadeAlpha})`;
    ctx.textAlign = 'center';
    ctx.fillText(responseText, W/2, H/2 + 70);
  }

  requestAnimationFrame(draw);
}

// Start
initSpeech();
draw();
</script>
</body>
</html>
