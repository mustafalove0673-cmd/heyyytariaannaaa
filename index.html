<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ariana</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100vh; overflow: hidden; background: #000000; }
body { display: flex; align-items: center; justify-content: center; }

canvas { position: fixed; inset: 0; z-index: 1; }

.status {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-family: 'Courier New', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(168, 85, 247, 0.25);
  text-align: center;
  pointer-events: none;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="status" id="status">tıkla ve konuş</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', () => { resize(); initParticles(); });

// Particles
let particles = [];
const NUM = 260;

function initParticles() {
  particles = [];
  for (let i = 0; i < NUM; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      baseX: 0, baseY: 0,
      vx: 0, vy: 0,
      size: Math.random() * 1.2 + 0.4,
      opacity: Math.random() * 0.3 + 0.08,
      phase: Math.random() * Math.PI * 2,
      orbitR: Math.random() * 35 + 8,
      orbitSpeed: (Math.random() - 0.5) * 0.005,
      orbitAngle: Math.random() * Math.PI * 2,
      hue: 168 + (Math.random() - 0.5) * 18,
    });
    particles[i].baseX = particles[i].x;
    particles[i].baseY = particles[i].y;
  }
}
initParticles();

// State
let isListening = false;
let isSpeaking = false;
let voiceLevel = 0;
let targetLevel = 0;
let transcript = '';
let responseText = '';
let silenceFrames = 0;
const SILENCE_THRESHOLD = 20;
let interactionActive = false;

// Mouse
let mouseX = W / 2, mouseY = H / 2;
document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});
document.addEventListener('click', () => {
  if (!isListening && !isSpeaking) {
    startListening();
  }
});

// ===== VOICE ENGINE =====
let recognition = null;
let currentTranscript = '';
const synthesis = window.speechSynthesis;

function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { status.textContent = 'ses desteklenmiyor'; return; }
  recognition = new SR();
  recognition.lang = 'tr-TR';
  recognition.interimResults = true;
  recognition.continuous = true;
  recognition.maxAlternatives = 1;

  recognition.onresult = e => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const txt = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += txt;
      else interim += txt;
    }
    currentTranscript = final || interim;
    transcript = currentTranscript;

    if (final) {
      silenceFrames = 0;
      const cleaned = final.trim();
      if (cleaned.length >= 2) {
        stopListening();
        processCommand(cleaned);
      }
    } else {
      silenceFrames = 0;
    }
  };

  recognition.onerror = e => {
    if (e.error === 'no-speech') {
      silenceFrames++;
      if (silenceFrames > SILENCE_THRESHOLD && isListening) {
        stopListening();
      }
      return;
    }
    if (e.error === 'aborted') return;
    if (isListening) initSpeech();
  };

  recognition.onend = () => {
    if (isListening && !isSpeaking) initSpeech();
  };
}

function startListening() {
  if (isSpeaking) return;
  currentTranscript = '';
  transcript = '';
  silenceFrames = 0;

  if (!recognition) initSpeech();
  if (!recognition) return;

  try {
    recognition.start();
    isListening = true;
    status.textContent = 'dinliyorum...';
  } catch(e) {
    setTimeout(startListening, 400);
  }
}

function stopListening() {
  isListening = false;
  if (recognition) {
    try { recognition.abort(); } catch(e) {}
  }
}

// ===== RESPONSES =====
function processCommand(text) {
  isSpeaking = true;
  targetLevel = 1;
  status.textContent = 'cevap veriyor';
  responseText = '';
  interactionActive = true;

  const t = text.toLowerCase();

  // Exact match — no guessing
  let reply = null;

  // Saat
  if (/saat/.test(t) && t.length < 15) {
    const n = new Date();
    reply = `${String(n.getHours()).padStart(2, '0')}:${String(n.getMinutes()).padStart(2, '0')}`;
  }
  // Tarih
  else if (/tarih|bugün/.test(t) && t.length < 15) {
    const days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
    const months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
    const n = new Date();
    reply = `${n.getDate()} ${months[n.getMonth()]} ${n.getFullYear()} ${days[n.getDay()]}`;
  }
  // Nasılsın
  else if (/nasılsın|naber|n.aber/.test(t)) {
    reply = 'İyiyim, sen nasılsın?';
  }
  // Kimsin
  else if (/kimsin|nesin/.test(t)) {
    reply = 'Ben Ariana, yapay zeka asistanıyım.';
  }
  // Merhaba
  else if (/merhaba|selam|hey/.test(t)) {
    reply = 'Merhaba.';
  }
  // Adın
  else if (/adın|ismin/.test(t)) {
    reply = 'Adım Ariana.';
  }
  // Teşekkür
  else if (/teşekkür|sağ ol/.test(t)) {
    reply = 'Rica ederim.';
  }
  // Kapat
  else if (/kapat|durdur/.test(t)) {
    stopListening();
    isSpeaking = false;
    targetLevel = 0;
    status.textContent = 'kapatıldı';
    interactionActive = false;
    responseText = '';
    return;
  }
  // Bilinmeyen — sessiz kal
  else {
    // Bilmediğinde sadece "tamam" de
    if (text.length > 2) {
      reply = 'Tamam.';
    }
  }

  if (reply) speak(reply);
  else {
    isSpeaking = false;
    targetLevel = 0;
    interactionActive = false;
    status.textContent = 'tıkla ve konuş';
  }
}

function speak(text) {
  responseText = text;

  if (!synthesis) {
    isSpeaking = false;
    targetLevel = 0;
    interactionActive = false;
    status.textContent = text;
    setTimeout(() => { status.textContent = 'tıkla ve konuş'; }, 2500);
    return;
  }

  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'tr-TR';
  u.rate = 0.9;
  u.pitch = 1.05;

  // Find Turkish voice
  const voices = synthesis.getVoices();
  const trVoice = voices.find(v => v.lang.includes('tr')) ||
                  voices.find(v => v.lang === 'tr-TR') ||
                  voices[0];
  if (trVoice) u.voice = trVoice;

  u.onend = () => {
    isSpeaking = false;
    targetLevel = 0;
    interactionActive = false;
    responseText = '';
    status.textContent = 'tıkla ve konuş';
    setTimeout(() => {
      if (!isListening && !isSpeaking) startListening();
    }, 500);
  };
  u.onerror = () => {
    isSpeaking = false;
    targetLevel = 0;
    interactionActive = false;
    status.textContent = text;
    setTimeout(() => { status.textContent = 'tıkla ve konuş'; }, 2500);
  };

  synthesis.speak(u);
}

if (synthesis) {
  synthesis.onvoiceschanged = () => synthesis.getVoices();
  synthesis.getVoices();
}

// ===== DRAW =====
let t = 0;
let responsePhase = 0;

function draw() {
  ctx.clearRect(0, 0, W, H);
  t += 0.008;
  responsePhase += 0.02;

  voiceLevel += (targetLevel - voiceLevel) * 0.06;
  const level = voiceLevel;
  const pulse = Math.sin(t * 2) * 0.07 + 0.93;

  particles.forEach((p, i) => {
    p.orbitAngle += p.orbitSpeed;

    let tx = p.baseX;
    let ty = p.baseY;

    if (level > 0) {
      const dx = p.x - W / 2;
      const dy = p.y - H / 2;
      const dist = Math.sqrt(dx * dx + dy * dy) + 1;
      const maxD = Math.min(W, H) * 0.45;

      const wave = Math.sin(dist * 0.016 - t * 6 + p.phase) * level * 85 * pulse;
      const wave2 = Math.sin(dist * 0.007 + t * 2.5) * level * 30;
      const pull = (1 - dist / maxD) * level * 0.45;

      tx += dx / dist * dist * pull * 0.2;
      ty += dy / dist * dist * pull * 0.2;

      const perpX = -dy / dist;
      const perpY = dx / dist;
      tx += perpX * (wave + wave2);
      ty += perpY * (wave + wave2);
    }

    // Idle drift
    tx += Math.sin(t * 0.4 + i * 0.25) * 1.2;
    ty += Math.cos(t * 0.35 + i * 0.2) * 0.8;

    // Mouse
    const mdx = p.x - mouseX;
    const mdy = p.y - mouseY;
    const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
    if (mdist < 90) {
      tx += (mdx / mdist) * (1 - mdist / 90) * 18;
      ty += (mdy / mdist) * (1 - mdist / 90) * 18;
    }

    // Spring
    p.vx += (tx - p.x) * 0.03;
    p.vy += (ty - p.y) * 0.03;
    p.vx *= 0.9;
    p.vy *= 0.9;
    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0) { p.x = 0; p.baseX = 0; }
    if (p.x > W) { p.x = W; p.baseX = W; }
    if (p.y < 0) { p.y = 0; p.baseY = 0; }
    if (p.y > H) { p.y = H; p.baseY = H; }

    let size = p.size * (level > 0 ? (1 + level * 2) : 1);
    let alpha = p.opacity + (level > 0 ? level * 0.4 : 0);

    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 65%, 60%, ${Math.min(0.8, alpha)})`;
    ctx.fill();

    if (level > 0.03 || size > 1) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, size * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, 65%, 60%, ${Math.min(0.8, alpha) * 0.05})`;
      ctx.fill();
    }

    if (level > 0.2) {
      for (let j = i + 1; j < particles.length; j += 7) {
        const q = particles[j];
        const d = Math.sqrt((p.x-q.x)**2 + (p.y-q.y)**2);
        if (d < 50 * level) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.strokeStyle = `hsla(${p.hue}, 65%, 60%, ${(1 - d/(50*level)) * 0.1 * level})`;
          ctx.lineWidth = 0.3;
          ctx.stroke();
        }
      }
    }
  });

  // Show what user said
  if (transcript && isListening) {
    ctx.font = '10px Courier New';
    ctx.fillStyle = 'rgba(168, 85, 247, 0.2)';
    ctx.textAlign = 'center';
    ctx.fillText(transcript, W/2, H/2 + 65);
  }

  // Show response
  if (responseText && isSpeaking) {
    const a = Math.min(0.3, 0.18 + Math.sin(responsePhase) * 0.08);
    ctx.font = '11px Courier New';
    ctx.fillStyle = `rgba(168, 85, 247, ${a})`;
    ctx.textAlign = 'center';
    ctx.fillText(responseText, W/2, H/2 + 65);
  }

  requestAnimationFrame(draw);
}

initSpeech();
draw();
</script>
</body>
</html>
