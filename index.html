<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ariana</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100vh; overflow: hidden; background: #000000; }
body { display: flex; align-items: center; justify-content: center; }

canvas { position: fixed; inset: 0; z-index: 1; }

.status {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  font-family: 'Courier New', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(168, 85, 247, 0.25);
  text-align: center;
  transition: opacity 0.5s;
  pointer-events: none;
}

.status.hidden { opacity: 0; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div class="status" id="status">dinlemede</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// Particles
const NUM = 320;
const particles = [];

for (let i = 0; i < NUM; i++) {
  particles.push({
    x: Math.random() * W,
    y: Math.random() * H,
    baseX: 0,
    baseY: 0,
    vx: 0,
    vy: 0,
    size: Math.random() * 1.5 + 0.3,
    opacity: Math.random() * 0.4 + 0.1,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.3 + 0.1,
    orbitRadius: Math.random() * 60 + 20,
    orbitSpeed: Math.random() * 0.005 + 0.002,
    orbitAngle: Math.random() * Math.PI * 2,
    shape: Math.floor(Math.random() * 4), // 0: dot, 1: ring, 2: line, 3: wave
  });
  particles[i].baseX = particles[i].x;
  particles[i].baseY = particles[i].y;
}

// Voice state
let isListening = false;
let isSpeaking = false;
let voiceLevel = 0;
let targetVoiceLevel = 0;
let commandText = '';

// Speech Recognition
let recognition = null;
let synthesis = window.speechSynthesis;

function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { statusEl.textContent = 'ses desteklenmiyor'; return; }

  recognition = new SR();
  recognition.lang = 'tr-TR';
  recognition.interimResults = true;
  recognition.continuous = true;
  recognition.maxAlternatives = 1;

  recognition.onresult = e => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    commandText = final || interim;
    if (final) processCommand(final.trim());
  };

  recognition.onerror = e => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    startListening();
  };

  recognition.onend = () => {
    if (isListening) startListening();
  };

  startListening();
}

function startListening() {
  if (!recognition) { initSpeech(); return; }
  try {
    recognition.start();
    isListening = true;
    statusEl.textContent = 'dinlemede';
    statusEl.classList.remove('hidden');
  } catch(e) { setTimeout(startListening, 300); }
}

const responses = {
  saat: () => {
    const n = new Date();
    return `Saat ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  },
  tarih: () => {
    const days = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
    const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
    const n = new Date();
    return `${days[n.getDay()]}, ${n.getDate()} ${months[n.getMonth()]} ${n.getFullYear()}`;
  },
  nasilsin: () => 'Harikayim, seninle konusmak guzel.',
  kimsin: () => 'Ben Ariana. Yapay zeka asistaniyim.',
  merhaba: () => 'Merhaba! Dinliyorum.',
  varsayilan: t => `Anladim. "${t}" dedin.`
};

function processCommand(text) {
  text = text.toLowerCase();
  let reply = null;
  if (/saat/.test(text)) reply = responses.saat();
  else if (/tarih/.test(text)) reply = responses.tarih();
  else if (/nas[iı]ls[iı]n/.test(text)) reply = responses.nasilsin;
  else if (/kimsin/.test(text)) reply = responses.kimsin;
  else if (/merhaba|selam/.test(text)) reply = responses.merhaba;
  else if (text.length > 1) reply = responses.varsayilan(text);

  if (reply) {
    speak(reply);
    statusEl.textContent = 'cevap veriyor';
    commandText = '';
  }
}

function speak(text) {
  if (!synthesis) return;
  isSpeaking = true;
  targetVoiceLevel = 1;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'tr-TR';
  u.rate = 0.95;
  u.pitch = 1.1;
  u.onend = () => {
    isSpeaking = false;
    targetVoiceLevel = 0;
    statusEl.textContent = 'dinlemede';
    setTimeout(() => { statusEl.classList.add('hidden'); }, 1500);
  };
  u.onerror = () => { isSpeaking = false; targetVoiceLevel = 0; };
  synthesis.speak(u);
}

// Simulate voice level from speech synthesis
let speakTimer = 0;
function simulateVoiceLevel() {
  if (isSpeaking) {
    speakTimer++;
    targetVoiceLevel = Math.sin(speakTimer * 0.15) * 0.5 + 0.5;
  } else {
    targetVoiceLevel *= 0.92;
  }
}

// Mouse interaction
let mouseX = W / 2, mouseY = H / 2;
document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// Time
let t = 0;

function draw() {
  ctx.clearRect(0, 0, W, H);
  t += 0.008;

  // Smooth voice level
  voiceLevel += (targetVoiceLevel - voiceLevel) * 0.08;
  simulateVoiceLevel();

  const active = isListening || voiceLevel > 0.05;
  const level = active ? (voiceLevel * 1.5 + 0.3) : 0;

  particles.forEach((p, i) => {
    p.orbitAngle += p.orbitSpeed;

    let tx = p.baseX;
    let ty = p.baseY;

    // Wave from voice level
    if (level > 0) {
      const dx = p.x - W / 2;
      const dy = p.y - H / 2;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const maxDist = Math.min(W, H) * 0.5;
      const wave = Math.sin(dist * 0.02 - t * 4 + p.phase) * level * 80;
      const pull = (1 - dist / maxDist) * level;
      tx += dx * pull * 0.5;
      ty += dy * pull * 0.5;
      const perpX = -dy / (dist + 1);
      const perpY = dx / (dist + 1);
      tx += perpX * wave;
      ty += perpY * wave;
    }

    // Mouse repulsion
    const mdx = p.x - mouseX;
    const mdy = p.y - mouseY;
    const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
    if (mdist < 120) {
      const push = (1 - mdist / 120) * 30;
      tx += (mdx / mdist) * push;
      ty += (mdy / mdist) * push;
    }

    // Orbit around base
    const ox = Math.cos(p.orbitAngle) * p.orbitRadius * (0.3 + level * 0.7);
    const oy = Math.sin(p.orbitAngle) * p.orbitRadius * (0.3 + level * 0.7);

    const px = tx + ox;
    const py = ty + oy;

    // Smooth movement
    p.vx += (px - p.x) * 0.04;
    p.vy += (py - p.y) * 0.04;
    p.vx *= 0.85;
    p.vy *= 0.85;
    p.x += p.vx;
    p.y += p.vy;

    // Opacity based on activity
    let alpha = p.opacity;
    if (level > 0) {
      alpha = Math.min(0.9, p.opacity + level * 0.5);
    }

    // Size
    let size = p.size;
    if (level > 0) {
      size = p.size * (1 + level * 2);
    }

    // Color
    const hue = 168 + Math.sin(t + i * 0.1) * 15;

    ctx.beginPath();
    ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${hue}, 70%, 65%, ${alpha})`;
    ctx.fill();

    // Glow
    if (size > 1 || level > 0.2) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, size * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${hue}, 70%, 65%, ${alpha * 0.08})`;
      ctx.fill();
    }

    // Lines between close particles when active
    if (level > 0.3) {
      for (let j = i + 1; j < particles.length; j++) {
        const q = particles[j];
        const dx = p.x - q.x;
        const dy = p.y - q.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 50 * level) {
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.strokeStyle = `hsla(${hue}, 70%, 65%, ${(1 - d / (50 * level)) * 0.15 * level})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  });

  requestAnimationFrame(draw);
}

// Start
initSpeech();
draw();

// Resize base positions on resize
window.addEventListener('resize', () => {
  resize();
  particles.forEach(p => {
    p.baseX = Math.random() * W;
    p.baseY = Math.random() * H;
    p.x = p.baseX;
    p.y = p.baseY;
  });
});
</script>
</body>
</html>
