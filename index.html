<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ariana</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100vh; overflow: hidden; background: #ffffff; }

body {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Neon yellow diagonal lines pattern */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 0;
  background: repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 30px,
    rgba(250, 204, 21, 0.15) 30px,
    rgba(250, 204, 21, 0.15) 31px
  );
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 1;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 60px,
    rgba(250, 204, 21, 0.08) 60px,
    rgba(250, 204, 21, 0.08) 61px
  );
}

/* Grid dots pattern */
.grid-dots {
  position: fixed;
  inset: 0;
  z-index: 2;
  background-image: radial-gradient(circle, rgba(10,10,10,0.12) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Solid neon diagonal lines - thick */
.thick-lines {
  position: fixed;
  inset: 0;
  z-index: 3;
  background: repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 100px,
    rgba(250, 204, 21, 0.25) 100px,
    rgba(250, 204, 21, 0.25) 102px
  );
}

/* Small checkerboard overlay */
.checker {
  position: fixed;
  inset: 0;
  z-index: 4;
  background-image:
    linear-gradient(45deg, rgba(10,10,10,0.03) 25%, transparent 25%),
    linear-gradient(-45deg, rgba(10,10,10,0.03) 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, rgba(10,10,10,0.03) 75%),
    linear-gradient(-45deg, transparent 75%, rgba(10,10,10,0.03) 75%);
  background-size: 20px 20px;
  background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
}

/* Heavy neon right-side gradient */
.neon-wash {
  position: fixed;
  inset: 0;
  z-index: 5;
  background: linear-gradient(
    135deg,
    transparent 50%,
    rgba(250, 204, 21, 0.12) 100%
  );
  pointer-events: none;
}

/* Black border frame */
.frame {
  position: fixed;
  z-index: 20;
  pointer-events: none;
}

.frame-t { top: 0; left: 0; right: 0; height: 6px; background: #0a0a0a; }
.frame-b { bottom: 0; left: 0; right: 0; height: 6px; background: #0a0a0a; }
.frame-l { top: 0; left: 0; bottom: 0; width: 6px; background: #0a0a0a; }
.frame-r { top: 0; right: 0; bottom: 0; width: 6px; background: #0a0a0a; }

/* Corner accents */
.corner {
  position: fixed;
  z-index: 21;
  width: 40px;
  height: 40px;
}
.corner-tl { top: 20px; left: 20px; border-top: 3px solid #facc15; border-left: 3px solid #facc15; }
.corner-tr { top: 20px; right: 20px; border-top: 3px solid #facc15; border-right: 3px solid #facc15; }
.corner-bl { bottom: 20px; left: 20px; border-bottom: 3px solid #facc15; border-left: 3px solid #facc15; }
.corner-br { bottom: 20px; right: 20px; border-bottom: 3px solid #facc15; border-right: 3px solid #facc15; }

/* Floating geometric shapes */
.shape {
  position: fixed;
  z-index: 6;
  border: 2px solid #0a0a0a;
  opacity: 0.08;
  pointer-events: none;
}

.shape-1 {
  top: 8%;
  right: 12%;
  width: 120px;
  height: 120px;
  transform: rotate(30deg);
  border-color: #facc15;
  opacity: 0.15;
}

.shape-2 {
  bottom: 15%;
  left: 8%;
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border-color: #0a0a0a;
}

.shape-3 {
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  width: 400px;
  height: 400px;
  border-width: 1px;
  border-color: #facc15;
  opacity: 0.06;
}

.shape-4 {
  top: 20%;
  left: 30%;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border-color: #facc15;
  opacity: 0.12;
}

.shape-5 {
  bottom: 30%;
  right: 20%;
  width: 80px;
  height: 80px;
  transform: rotate(15deg);
  border-color: #0a0a0a;
  opacity: 0.06;
}

/* Horizontal divider lines */
.divider {
  position: fixed;
  z-index: 7;
  left: 0;
  right: 0;
  height: 1px;
  background: rgba(10,10,10,0.06);
  pointer-events: none;
}
.divider-1 { top: 25%; }
.divider-2 { top: 50%; }
.divider-3 { top: 75%; }

/* Vertical divider lines */
.vdivider {
  position: fixed;
  z-index: 7;
  top: 0;
  bottom: 0;
  width: 1px;
  background: rgba(10,10,10,0.04);
  pointer-events: none;
}
.vdivider-1 { left: 25%; }
.vdivider-2 { left: 50%; }
.vdivider-3 { left: 75%; }

/* Animated pulsing neon dot */
.pulse-dot {
  position: fixed;
  z-index: 10;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #facc15;
  pointer-events: none;
  animation: pulse-me 3s ease-in-out infinite;
}

.pulse-dot-1 { top: 25%; right: 25%; }
.pulse-dot-2 { bottom: 35%; left: 20%; animation-delay: 1s; }
.pulse-dot-3 { top: 60%; right: 15%; animation-delay: 2s; }

@keyframes pulse-me {
  0%, 100% { opacity: 0.2; transform: scale(1); box-shadow: none; }
  50% { opacity: 1; transform: scale(1.8); box-shadow: 0 0 30px rgba(250, 204, 21, 0.6); }
}
</style>
</head>
<body>
<div class="grid-dots"></div>
<div class="thick-lines"></div>
<div class="checker"></div>
<div class="neon-wash"></div>

<div class="frame frame-t"></div>
<div class="frame frame-b"></div>
<div class="frame frame-l"></div>
<div class="frame frame-r"></div>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="divider divider-1"></div>
<div class="divider divider-2"></div>
<div class="divider divider-3"></div>
<div class="vdivider vdivider-1"></div>
<div class="vdivider vdivider-2"></div>
<div class="vdivider vdivider-3"></div>

<div class="shape shape-1"></div>
<div class="shape shape-2"></div>
<div class="shape shape-3"></div>
<div class="shape shape-4"></div>
<div class="shape shape-5"></div>

<div class="pulse-dot pulse-dot-1"></div>
<div class="pulse-dot pulse-dot-2"></div>
<div class="pulse-dot pulse-dot-3"></div>
</body>
</html>
