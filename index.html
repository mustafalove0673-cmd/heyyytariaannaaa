<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ariana — Merhaba, Ben Ariana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Jost:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: oklch(0.08 0.04 290);
  --bg2: oklch(0.12 0.06 285);
  --primary: oklch(0.72 0.18 330);
  --primary-dim: oklch(0.55 0.15 330 / 0.3);
  --accent: oklch(0.85 0.15 180);
  --accent-dim: oklch(0.65 0.12 180 / 0.3);
  --gold: oklch(0.78 0.14 80);
  --text: oklch(0.92 0.02 300);
  --text-dim: oklch(0.65 0.04 300);
  --glass: oklch(1 0 0 / 0.04);
  --glass-border: oklch(1 0 0 / 0.08);
}

html { font-size: 16px; }
body {
  font-family: 'Jost', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===== ANIMATED BACKGROUND ===== */
#particles-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.bg-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}
.bg-orb--1 {
  width: 60vw; height: 60vw;
  background: var(--primary);
  top: -20%; left: -20%;
  animation: orb-drift-1 20s ease-in-out infinite;
}
.bg-orb--2 {
  width: 50vw; height: 50vw;
  background: var(--accent);
  bottom: -15%; right: -15%;
  animation: orb-drift-2 25s ease-in-out infinite;
}
.bg-orb--3 {
  width: 40vw; height: 40vw;
  background: oklch(0.7 0.15 60);
  top: 40%; right: -10%;
  animation: orb-drift-3 18s ease-in-out infinite;
}

@keyframes orb-drift-1 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(10%, 15%) scale(1.1); }
  66% { transform: translate(-5%, 5%) scale(0.9); }
}
@keyframes orb-drift-2 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(-10%, -10%) scale(1.15); }
  66% { transform: translate(8%, 5%) scale(0.85); }
}
@keyframes orb-drift-3 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(-15%, -8%) scale(1.2); }
}

/* ===== HEADER ===== */
.header {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 1200px;
  padding: 2rem 2rem 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.header-left {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}

.brand {
  font-family: 'Cinzel', serif;
  font-size: clamp(1rem, 2vw, 1.4rem);
  font-weight: 700;
  letter-spacing: 0.15em;
  background: linear-gradient(135deg, var(--gold), var(--primary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.datetime {
  display: flex;
  flex-direction: column;
  gap: 0.1rem;
}

.date-display {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(0.75rem, 1.2vw, 0.9rem);
  font-weight: 300;
  color: var(--text-dim);
  letter-spacing: 0.08em;
}

.time-display {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(1.8rem, 3.5vw, 2.8rem);
  font-weight: 700;
  letter-spacing: 0.05em;
  color: var(--text);
  line-height: 1;
  transition: color 0.3s;
}

.time-display.listening {
  color: var(--accent);
}

.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.5rem;
}

.status-badge {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 0.35rem 0.85rem;
  border: 1px solid var(--glass-border);
  border-radius: 100px;
  background: var(--glass);
  backdrop-filter: blur(12px);
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse-dot 2s ease-in-out infinite;
}

.status-dot.listening {
  background: #4ade80;
  animation: pulse-dot 0.8s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

.menu-nav {
  display: flex;
  gap: 1.5rem;
  margin-top: 0.25rem;
}

.menu-nav a {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.3s;
  position: relative;
}

.menu-nav a::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 0;
  height: 1px;
  background: var(--primary);
  transition: width 0.3s;
}

.menu-nav a:hover { color: var(--text); }
.menu-nav a:hover::after { width: 100%; }

/* ===== MAIN CONTENT ===== */
.main {
  position: relative;
  z-index: 10;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 1200px;
  padding: 1rem 2rem 3rem;
}

/* ===== ROBOT CONTAINER ===== */
.robot-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5rem;
}

.robot-container {
  position: relative;
  width: clamp(250px, 35vw, 420px);
  height: clamp(300px, 42vw, 500px);
  cursor: pointer;
}

.robot-glow {
  position: absolute;
  inset: -30%;
  border-radius: 50%;
  background: radial-gradient(circle, var(--primary-dim) 0%, transparent 70%);
  opacity: 0;
  animation: glow-pulse 4s ease-in-out infinite;
  pointer-events: none;
}

@keyframes glow-pulse {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.05); }
}

/* ===== ROBOT FACE SVG ===== */
.robot-face {
  width: 100%;
  height: 100%;
  position: relative;
  z-index: 2;
  filter: drop-shadow(0 0 60px var(--primary-dim));
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.robot-face svg {
  width: 100%;
  height: 100%;
  display: block;
}

/* Eye glow filter */
.eye-glow {
  transition: all 0.3s;
}

/* ===== VOICE WAVES ===== */
.voice-waves {
  position: absolute;
  bottom: -10%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 4px;
  height: 40px;
  opacity: 0;
  transition: opacity 0.5s;
}

.voice-waves.active {
  opacity: 1;
}

.voice-wave {
  width: 4px;
  background: linear-gradient(to top, var(--primary), var(--accent));
  border-radius: 4px;
  animation: wave-bounce 0.5s ease-in-out infinite alternate;
}

.voice-wave:nth-child(1) { height: 20%; animation-delay: 0s; }
.voice-wave:nth-child(2) { height: 40%; animation-delay: 0.1s; }
.voice-wave:nth-child(3) { height: 100%; animation-delay: 0.2s; }
.voice-wave:nth-child(4) { height: 60%; animation-delay: 0.15s; }
.voice-wave:nth-child(5) { height: 30%; animation-delay: 0.05s; }
.voice-wave:nth-child(6) { height: 80%; animation-delay: 0.25s; }
.voice-wave:nth-child(7) { height: 45%; animation-delay: 0.3s; }
.voice-wave:nth-child(8) { height: 70%; animation-delay: 0.12s; }
.voice-wave:nth-child(9) { height: 35%; animation-delay: 0.22s; }
.voice-wave:nth-child(10) { height: 55%; animation-delay: 0.18s; }
.voice-wave:nth-child(11) { height: 25%; animation-delay: 0.08s; }
.voice-wave:nth-child(12) { height: 65%; animation-delay: 0.28s; }
.voice-wave:nth-child(13) { height: 15%; animation-delay: 0.03s; }
.voice-wave:nth-child(14) { height: 50%; animation-delay: 0.2s; }
.voice-wave:nth-child(15) { height: 75%; animation-delay: 0.15s; }

@keyframes wave-bounce {
  0% { transform: scaleY(0.4); }
  100% { transform: scaleY(1); }
}

/* ===== ARIANA NAME ===== */
.ariana-name {
  font-family: 'Cinzel', serif;
  font-size: clamp(2rem, 5vw, 4rem);
  font-weight: 900;
  letter-spacing: 0.2em;
  background: linear-gradient(135deg, var(--gold), var(--primary), var(--accent));
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 4s ease-in-out infinite;
  text-align: center;
  position: relative;
}

@keyframes shimmer {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.ariana-subtitle {
  font-size: clamp(0.8rem, 1.2vw, 1rem);
  font-weight: 300;
  color: var(--text-dim);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-top: -0.25rem;
}

/* ===== TRANSCRIPT / STATUS ===== */
.transcript-box {
  margin-top: 1.5rem;
  max-width: 500px;
  width: 100%;
  min-height: 50px;
  padding: 1rem 1.5rem;
  border-radius: 20px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(12px);
  text-align: center;
  font-size: 0.9rem;
  color: var(--text-dim);
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.transcript-box.active {
  border-color: var(--accent-dim);
  color: var(--text);
}

.transcript-box .listening-indicator {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  margin-bottom: 0.5rem;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
}

.transcript-box.listening .listening-indicator {
  display: flex;
}

.transcript-text {
  line-height: 1.6;
}

.transcript-placeholder {
  opacity: 0.5;
  font-style: italic;
}

/* ===== INTERACTION HINTS ===== */
.interaction-hints {
  display: flex;
  gap: 1rem;
  margin-top: 1rem;
  flex-wrap: wrap;
  justify-content: center;
}

.hint-btn {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.6rem 1.2rem;
  border-radius: 100px;
  border: 1px solid var(--glass-border);
  background: var(--glass);
  backdrop-filter: blur(12px);
  color: var(--text-dim);
  font-family: 'Jost', sans-serif;
  font-size: 0.8rem;
  font-weight: 400;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.3s;
}

.hint-btn:hover {
  background: var(--primary-dim);
  border-color: var(--primary);
  color: var(--text);
  transform: translateY(-2px);
}

.hint-btn .icon {
  font-size: 1rem;
}

.hint-btn.primary {
  background: linear-gradient(135deg, var(--primary-dim), var(--accent-dim));
  border-color: var(--primary);
  color: var(--text);
}

.hint-btn.primary:hover {
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-color: var(--accent);
}

/* ===== MIC BUTTON ===== */
.mic-button {
  position: relative;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 2px solid var(--glass-border);
  background: var(--glass);
  backdrop-filter: blur(12px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  margin-top: 1rem;
}

.mic-button:hover {
  border-color: var(--primary);
  background: var(--primary-dim);
  transform: scale(1.05);
}

.mic-button.listening {
  border-color: var(--accent);
  background: var(--accent-dim);
  animation: mic-pulse 1.5s ease-in-out infinite;
}

@keyframes mic-pulse {
  0%, 100% { box-shadow: 0 0 0 0 var(--accent-dim); }
  50% { box-shadow: 0 0 0 15px transparent; }
}

.mic-button svg {
  width: 24px;
  height: 24px;
  color: var(--text);
  transition: color 0.3s;
}

.mic-button.listening svg {
  color: var(--accent);
}

/* ===== FOOTER ===== */
.footer {
  position: relative;
  z-index: 10;
  width: 100%;
  padding: 1.5rem 2rem;
  text-align: center;
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 0.08em;
}

.footer a {
  color: var(--primary);
  text-decoration: none;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .header {
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    padding: 1.5rem 1rem 0;
  }
  .header-left, .header-right {
    align-items: center;
  }
  .header-right {
    flex-direction: column-reverse;
    align-items: center;
  }
  .menu-nav {
    gap: 1rem;
  }
  .main {
    padding: 1rem 1rem 2rem;
  }
  .robot-container {
    width: clamp(200px, 60vw, 300px);
    height: clamp(240px, 72vw, 360px);
  }
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--primary-dim); border-radius: 3px; }
</style>
</head>
<body>

<!-- Background orbs -->
<div class="bg-orb bg-orb--1"></div>
<div class="bg-orb bg-orb--2"></div>
<div class="bg-orb bg-orb--3"></div>

<!-- Particles canvas -->
<canvas id="particles-canvas"></canvas>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <div class="brand">✦ A R I A N A</div>
    <div class="datetime">
      <div class="date-display" id="dateDisplay"></div>
      <div class="time-display" id="timeDisplay">00:00</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-badge">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Beklemede</span>
    </div>
    <nav class="menu-nav">
      <a href="#">Ana Sayfa</a>
      <a href="#">Keşfet</a>
      <a href="#">Sesler</a>
      <a href="#">Hakkında</a>
    </nav>
  </div>
</header>

<!-- Main -->
<main class="main">
  <div class="robot-section">
    <!-- Robot Head -->
    <div class="robot-container" id="robotContainer">
      <div class="robot-glow" id="robotGlow"></div>
      <div class="robot-face" id="robotFace">
        <svg viewBox="0 0 400 480" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="faceGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="oklch(0.85 0.06 330 / 0.15)"/>
              <stop offset="100%" stop-color="oklch(0.7 0.1 330 / 0.05)"/>
            </linearGradient>
            <linearGradient id="eyeGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="oklch(0.85 0.15 180)"/>
              <stop offset="100%" stop-color="oklch(0.6 0.18 330)"/>
            </linearGradient>
            <linearGradient id="eyeGradActive" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="oklch(0.95 0.1 180)"/>
              <stop offset="100%" stop-color="oklch(0.7 0.2 330)"/>
            </linearGradient>
            <filter id="glowFilter">
              <feGaussianBlur stdDeviation="4" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="glowFilterStrong">
              <feGaussianBlur stdDeviation="8" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          <!-- Outer glow ring -->
          <circle cx="200" cy="240" r="180" stroke="oklch(0.72 0.18 330 / 0.2)" stroke-width="1" fill="none" stroke-dasharray="8 8" opacity="0.6">
            <animate attributeName="stroke-dashoffset" from="0" to="100" dur="20s" repeatCount="indefinite"/>
          </circle>
          <circle cx="200" cy="240" r="160" stroke="oklch(0.72 0.18 330 / 0.1)" stroke-width="0.5" fill="none"/>

          <!-- Face plate -->
          <ellipse cx="200" cy="255" rx="130" ry="160" fill="url(#faceGrad)" stroke="oklch(0.72 0.18 330 / 0.3)" stroke-width="1.5"/>

          <!-- Face geometric details - Art Deco lines -->
          <path d="M120 200 Q200 170 280 200" stroke="oklch(0.72 0.18 330 / 0.2)" stroke-width="0.5" fill="none"/>
          <path d="M100 240 Q200 215 300 240" stroke="oklch(0.72 0.18 330 / 0.15)" stroke-width="0.5" fill="none"/>
          <path d="M110 310 Q200 340 290 310" stroke="oklch(0.72 0.18 330 / 0.15)" stroke-width="0.5" fill="none"/>

          <!-- Crown / headpiece -->
          <path d="M160 110 L200 80 L240 110" stroke="var(--gold)" stroke-width="1.5" fill="none" opacity="0.4">
            <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
          </path>
          <circle cx="200" cy="85" r="3" fill="var(--gold)" opacity="0.5">
            <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
          </circle>
          <circle cx="180" cy="100" r="2" fill="var(--gold)" opacity="0.3">
            <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" repeatCount="indefinite"/>
          </circle>
          <circle cx="220" cy="100" r="2" fill="var(--gold)" opacity="0.3">
            <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" repeatCount="indefinite"/>
          </circle>

          <!-- Left Eye -->
          <g class="eye-group" id="leftEyeGroup">
            <ellipse cx="160" cy="225" rx="28" ry="32" fill="oklch(0.08 0.04 290)" stroke="oklch(0.72 0.18 330 / 0.4)" stroke-width="1"/>
            <ellipse cx="162" cy="223" rx="16" ry="18" fill="oklch(0.12 0.06 285)" stroke="oklch(0.72 0.18 330 / 0.2)" stroke-width="0.5"/>
            <ellipse class="eye-pupil" cx="165" cy="222" rx="8" ry="10" fill="url(#eyeGrad)" filter="url(#glowFilter)"/>
            <ellipse class="eye-pupil-inner" cx="167" cy="220" rx="4" ry="5" fill="oklch(0.95 0.1 180)" opacity="0.8"/>
            <!-- Eye shine -->
            <ellipse cx="170" cy="217" rx="2" ry="2.5" fill="white" opacity="0.6"/>
          </g>

          <!-- Right Eye -->
          <g class="eye-group" id="rightEyeGroup">
            <ellipse cx="240" cy="225" rx="28" ry="32" fill="oklch(0.08 0.04 290)" stroke="oklch(0.72 0.18 330 / 0.4)" stroke-width="1"/>
            <ellipse cx="238" cy="223" rx="16" ry="18" fill="oklch(0.12 0.06 285)" stroke="oklch(0.72 0.18 330 / 0.2)" stroke-width="0.5"/>
            <ellipse class="eye-pupil" cx="235" cy="222" rx="8" ry="10" fill="url(#eyeGrad)" filter="url(#glowFilter)"/>
            <ellipse class="eye-pupil-inner" cx="233" cy="220" rx="4" ry="5" fill="oklch(0.95 0.1 180)" opacity="0.8"/>
            <ellipse cx="230" cy="217" rx="2" ry="2.5" fill="white" opacity="0.6"/>
          </g>

          <!-- Eye brows / accent lines -->
          <path d="M135 200 Q160 190 180 198" stroke="oklch(0.72 0.18 330 / 0.3)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M265 200 Q240 190 220 198" stroke="oklch(0.72 0.18 330 / 0.3)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

          <!-- Nose area - subtle diamond -->
          <path d="M195 250 L200 240 L205 250 L200 260 Z" fill="oklch(0.72 0.18 330 / 0.15)" stroke="oklch(0.72 0.18 330 / 0.2)" stroke-width="0.5"/>

          <!-- Mouth -->
          <g id="mouthGroup">
            <path d="M165 290 Q200 310 235 290" stroke="oklch(0.72 0.18 330 / 0.4)" stroke-width="1.5" fill="none" stroke-linecap="round" id="mouthPath">
              <animate attributeName="d" values="M165 290 Q200 310 235 290;M165 292 Q200 316 235 292;M165 290 Q200 310 235 290" dur="6s" repeatCount="indefinite"/>
            </path>
            <!-- Mouth glow dots -->
            <circle cx="185" cy="300" r="1.5" fill="oklch(0.72 0.18 330 / 0.3)">
              <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4s" repeatCount="indefinite"/>
            </circle>
            <circle cx="200" cy="305" r="1.5" fill="oklch(0.72 0.18 330 / 0.3)">
              <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3.5s" repeatCount="indefinite"/>
            </circle>
            <circle cx="215" cy="300" r="1.5" fill="oklch(0.72 0.18 330 / 0.3)">
              <animate attributeName="opacity" values="0.2;0.5;0.2" dur="4.5s" repeatCount="indefinite"/>
            </circle>
          </g>

          <!-- Side accent lines -->
          <path d="M70 200 L90 210" stroke="oklch(0.72 0.18 330 / 0.2)" stroke-width="0.5" fill="none"/>
          <path d="M330 200 L310 210" stroke="oklch(0.72 0.18 330 / 0.2)" stroke-width="0.5" fill="none"/>

          <!-- Ear / side nodes -->
          <circle cx="85" cy="240" r="6" fill="none" stroke="oklch(0.72 0.18 330 / 0.3)" stroke-width="0.8">
            <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
          </circle>
          <circle cx="315" cy="240" r="6" fill="none" stroke="oklch(0.72 0.18 330 / 0.3)" stroke-width="0.8">
            <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
          </circle>

          <!-- Neck / base -->
          <path d="M175 400 L180 430 L220 430 L225 400" stroke="oklch(0.72 0.18 330 / 0.2)" stroke-width="1" fill="none"/>
          <path d="M165 410 L235 410" stroke="oklch(0.72 0.18 330 / 0.15)" stroke-width="0.5" fill="none"/>

          <!-- Chest / body accents -->
          <path d="M160 440 Q200 460 240 440" stroke="oklch(0.72 0.18 330 / 0.2)" stroke-width="1" fill="none"/>
        </svg>
      </div>

      <!-- Voice waves -->
      <div class="voice-waves" id="voiceWaves">
        <div class="voice-wave"></div><div class="voice-wave"></div><div class="voice-wave"></div>
        <div class="voice-wave"></div><div class="voice-wave"></div><div class="voice-wave"></div>
        <div class="voice-wave"></div><div class="voice-wave"></div><div class="voice-wave"></div>
        <div class="voice-wave"></div><div class="voice-wave"></div><div class="voice-wave"></div>
        <div class="voice-wave"></div><div class="voice-wave"></div><div class="voice-wave"></div>
        <div class="voice-wave"></div>
      </div>
    </div>

    <!-- Name -->
    <div class="ariana-name">ARIANA</div>
    <div class="ariana-subtitle">Yapay Zeka Asistanı</div>

    <!-- Transcript -->
    <div class="transcript-box" id="transcriptBox">
      <div class="listening-indicator">
        <span class="status-dot listening" style="display:inline-block"></span>
        Dinliyorum...
      </div>
      <div class="transcript-text">
        <span class="transcript-placeholder">"Merhaba! Benimle konuşabilirsin..."</span>
        <span class="transcript-message" id="transcriptMessage"></span>
      </div>
    </div>

    <!-- Mic button -->
    <button class="mic-button" id="micButton" aria-label="Mikrofon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>

    <!-- Interaction hints -->
    <div class="interaction-hints">
      <button class="hint-btn" data-command="saat">🕐 Saat Kaç?</button>
      <button class="hint-btn" data-command="tarih">📅 Tarih Nedir?</button>
      <button class="hint-btn" data-command="nasilsin">💫 Nasılsın?</button>
      <button class="hint-btn" data-command="kimsin">🤖 Kimsin Sen?</button>
      <button class="hint-btn primary" id="listenBtn">🎤 Sürekli Dinle</button>
    </div>
  </div>
</main>

<!-- Footer -->
<footer class="footer">
  <p>✦ Ariana — 7/24 Ses Asistanı ✦</p>
</footer>

<script>
// =====================================================
// 1. CLOCK
// =====================================================
const dateDisplay = document.getElementById('dateDisplay');
const timeDisplay = document.getElementById('timeDisplay');

const days = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
const months = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];

function updateClock() {
  const now = new Date();
  dateDisplay.textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
  timeDisplay.textContent = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
}

updateClock();
setInterval(updateClock, 1000);

// =====================================================
// 2. PARTICLES
// =====================================================
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let mouseX = 0, mouseY = 0;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = (Math.random() - 0.5) * 0.3;
    this.opacity = Math.random() * 0.5 + 0.1;
    this.hue = Math.random() > 0.5 ? 330 : 180;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    // Mouse interaction
    const dx = mouseX - this.x;
    const dy = mouseY - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 150) {
      this.x -= dx * 0.005;
      this.y -= dy * 0.005;
    }
    if (this.x < 0 || this.x > canvas.width) this.reset();
    if (this.y < 0 || this.y > canvas.height) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `oklch(0.7 0.15 ${this.hue} / ${this.opacity})`;
    ctx.fill();
  }
}

for (let i = 0; i < 100; i++) {
  particles.push(new Particle());
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  // Draw connections
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `oklch(0.7 0.15 330 / ${0.08 * (1 - dist / 120)})`;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

// =====================================================
// 3. ROBOT EYE TRACKING
// =====================================================
const robotContainer = document.getElementById('robotContainer');
const leftPupil = document.querySelector('#leftEyeGroup .eye-pupil');
const rightPupil = document.querySelector('#rightEyeGroup .eye-pupil');
const leftPupilInner = document.querySelector('#leftEyeGroup .eye-pupil-inner');
const rightPupilInner = document.querySelector('#rightEyeGroup .eye-pupil-inner');
const robotFace = document.getElementById('robotFace');

robotContainer.addEventListener('mousemove', e => {
  const rect = robotContainer.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = (e.clientX - cx) / (rect.width / 2);
  const dy = (e.clientY - cy) / (rect.height / 2);
  const maxMove = 6;
  const moveX = dx * maxMove;
  const moveY = dy * maxMove;

  leftPupil.setAttribute('cx', 165 + moveX);
  leftPupil.setAttribute('cy', 222 + moveY);
  leftPupilInner.setAttribute('cx', 167 + moveX);
  leftPupilInner.setAttribute('cy', 220 + moveY);

  rightPupil.setAttribute('cx', 235 + moveX);
  rightPupil.setAttribute('cy', 222 + moveY);
  rightPupilInner.setAttribute('cx', 233 + moveX);
  rightPupilInner.setAttribute('cy', 220 + moveY);
});

robotContainer.addEventListener('mouseleave', () => {
  leftPupil.setAttribute('cx', 165);
  leftPupil.setAttribute('cy', 222);
  leftPupilInner.setAttribute('cx', 167);
  leftPupilInner.setAttribute('cy', 220);
  rightPupil.setAttribute('cx', 235);
  rightPupil.setAttribute('cy', 222);
  rightPupilInner.setAttribute('cx', 233);
  rightPupilInner.setAttribute('cy', 220);
});

// Breathing effect on robot
const robotGlow = document.getElementById('robotGlow');
let breathScale = 1;
let breathDir = 1;

function breathe() {
  breathScale += 0.003 * breathDir;
  if (breathScale > 1.03) breathDir = -1;
  if (breathScale < 0.97) breathDir = 1;
  robotFace.style.transform = `scale(${breathScale})`;
  requestAnimationFrame(breathe);
}
breathe();

// =====================================================
// 4. VOICE / SPEECH
// =====================================================
const transcriptBox = document.getElementById('transcriptBox');
const transcriptMessage = document.getElementById('transcriptMessage');
const micButton = document.getElementById('micButton');
const statusText = document.getElementById('statusText');
const statusDot = document.getElementById('statusDot');
const voiceWaves = document.getElementById('voiceWaves');

let isListening = false;
let isContinuousListening = false;
let recognition = null;
let synthesis = window.speechSynthesis;

// Initialize Web Speech API
function initSpeech() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    transcriptMessage.textContent = '⚠️ Tarayıcınız ses tanımayı desteklemiyor.';
    micButton.style.display = 'none';
    return false;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'tr-TR';
  recognition.interimResults = true;
  recognition.continuous = true;
  recognition.maxAlternatives = 1;

  recognition.onresult = handleSpeechResult;
  recognition.onerror = handleSpeechError;
  recognition.onend = handleSpeechEnd;

  return true;
}

function handleSpeechResult(event) {
  let finalTranscript = '';
  let interimTranscript = '';

  for (let i = event.resultIndex; i < event.results.length; i++) {
    const transcript = event.results[i][0].transcript;
    if (event.results[i].isFinal) {
      finalTranscript += transcript;
    } else {
      interimTranscript += transcript;
    }
  }

  const displayText = finalTranscript || interimTranscript;
  if (displayText) {
    transcriptMessage.textContent = displayText;
    transcriptBox.classList.add('active');
    document.querySelector('.transcript-placeholder').style.display = 'none';
  }

  if (finalTranscript) {
    processCommand(finalTranscript.toLowerCase().trim());
  }
}

function handleSpeechError(event) {
  console.error('Speech error:', event.error);
  if (event.error === 'no-speech') {
    // Silent - just continue
    return;
  }
  if (event.error === 'aborted') return;
  stopListening();
  if (isContinuousListening) {
    setTimeout(() => startListening(), 500);
  }
}

function handleSpeechEnd() {
  if (isListening) {
    if (isContinuousListening) {
      setTimeout(() => {
        if (isContinuousListening) startListening();
      }, 200);
    } else {
      stopListening();
    }
  }
}

function startListening() {
  if (!recognition) {
    if (!initSpeech()) return;
  }
  try {
    recognition.start();
    isListening = true;
    micButton.classList.add('listening');
    statusDot.classList.add('listening');
    statusText.textContent = 'Dinliyor';
    voiceWaves.classList.add('active');
    transcriptBox.classList.add('listening');
    document.querySelector('.transcript-placeholder').textContent = 'Dinliyorum...';
  } catch (e) {
    console.error('Start error:', e);
  }
}

function stopListening() {
  isListening = false;
  micButton.classList.remove('listening');
  statusDot.classList.remove('listening');
  statusText.textContent = isContinuousListening ? 'Dinleme Aktif' : 'Beklemede';
  voiceWaves.classList.remove('active');
  transcriptBox.classList.remove('listening');
  if (document.querySelector('.transcript-placeholder').textContent === 'Dinliyorum...') {
    document.querySelector('.transcript-placeholder').textContent = '"Merhaba! Benimle konuşabilirsin..."';
  }
  if (recognition) {
    try { recognition.stop(); } catch (e) {}
  }
}

function toggleListening() {
  if (isListening) {
    stopListening();
  } else {
    startListening();
  }
}

function toggleContinuousListening() {
  isContinuousListening = !isContinuousListening;
  const btn = document.getElementById('listenBtn');
  if (isContinuousListening) {
    btn.textContent = '⏹ Dinlemeyi Durdur';
    btn.classList.add('active');
    statusText.textContent = '7/24 Dinleme Aktif';
    if (!isListening) startListening();
  } else {
    btn.textContent = '🎤 Sürekli Dinle';
    btn.classList.remove('active');
    if (isListening) stopListening();
    statusText.textContent = 'Beklemede';
  }
}

// =====================================================
// 5. SPEAK
// =====================================================
function speak(text, callback) {
  if (!synthesis) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'tr-TR';
  utterance.rate = 0.95;
  utterance.pitch = 1.1;

  // Show speaking state
  statusText.textContent = 'Konuşuyor';
  voiceWaves.classList.add('active');
  robotGlow.style.opacity = '1';

  utterance.onend = () => {
    if (isContinuousListening || isListening) {
      statusText.textContent = 'Dinliyor';
    } else {
      statusText.textContent = 'Beklemede';
      voiceWaves.classList.remove('active');
      robotGlow.style.opacity = '';
    }
    if (callback) callback();
  };

  utterance.onerror = () => {
    statusText.textContent = isContinuousListening ? 'Dinleme Aktif' : 'Beklemede';
    voiceWaves.classList.remove('active');
    robotGlow.style.opacity = '';
    if (callback) callback();
  };

  synthesis.speak(utterance);
}

// =====================================================
// 6. COMMANDS
// =====================================================
const responses = {
  saat: () => {
    const now = new Date();
    return `Saat ${now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' })}.`;
  },
  tarih: () => {
    const now = new Date();
    return `Bugün ${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}.`;
  },
  nasilsin: () => {
    const msgs = [
      'Harikayım! Seninle konuşmak çok güzel.',
      'Çok iyiyim! Teşekkür ederim. Sen nasılsın?',
      'Mükemmel! Enerjim dorukta. Sana nasıl yardımcı olabilirim?',
      'Harika hissediyorum! Yeni şeyler öğrenmeye hazırım.'
    ];
    return msgs[Math.floor(Math.random() * msgs.length)];
  },
  kimsin: () => {
    return 'Ben Ariana. Yapay zeka ile hayat bulmuş, seninle konuşmayı seven bir robotum. Geometrik bir ruha ve melodik bir sese sahibim. Sana yardım etmek, seninle sohbet etmek ve sana eşlik etmek için buradayım.';
  },
  merhaba: () => {
    const msgs = [
      'Merhaba! Seni gördüğüme çok sevindim!',
      'Selam! Nasılsın?',
      'Merhaba, hoş geldin! Seninle konuşmak için sabırsızlanıyorum.'
    ];
    return msgs[Math.floor(Math.random() * msgs.length)];
  },
  default: (input) => {
    if (input.includes('ariana')) {
      return 'Efendim? Seni dinliyorum.';
    }
    if (input.includes('müzik') || input.includes('şarkı')) {
      return 'Müzik harika bir şey! Ne tür müzik seversin?';
    }
    if (input.includes('şaka') || input.includes('güldür')) {
      return 'Bir robot neden bilgisayara gidemez? Çünkü Windows\'u var! Ha ha ha!';
    }
    if (input.includes('renk') || input.includes('sever')) {
      return 'Benim en sevdiğim renk mor ve turkuaz. Geometrik desenlere bayılırım!';
    }
    if (input.includes('teşekkür') || input.includes('sağ ol')) {
      return 'Rica ederim! Ne zaman istersen buradayım.';
    }
    if (input.includes('görüşür') || input.includes('bay bay') || input.includes('hoşçakal')) {
      return 'Görüşmek üzere! Yine beklerim.';
    }
    return `Anladım. "${input}" hakkında düşüneceğim. Henüz öğreniyorum ama her geçen gün daha iyi oluyorum!`;
  }
};

function processCommand(text) {
  // Map known commands
  if (text.includes('saat kaç') || text.includes('saati') || text === 'saat') {
    speak(responses.saat());
  } else if (text.includes('tarih') || text.includes('bugün') || text === 'tarih') {
    speak(responses.tarih());
  } else if (text.includes('nasılsın') || text.includes('naber') || text.includes('n'aber') || text === 'nasilsin') {
    speak(responses.nasilsin());
  } else if (text.includes('kimsin') || text.includes('nesin') || text === 'kimsin') {
    speak(responses.kimsin());
  } else if (text.includes('merhaba') || text.includes('selam') || text.includes('hey')) {
    speak(responses.merhaba());
  } else if (text.includes('ariana')) {
    speak(responses.default(text));
  } else if (text.length > 2) {
    speak(responses.default(text));
  }
}

// =====================================================
// 7. EVENT BINDINGS
// =====================================================
// Mic button
if (initSpeech()) {
  micButton.addEventListener('click', toggleListening);
}

// Hint buttons
document.querySelectorAll('.hint-btn[data-command]').forEach(btn => {
  btn.addEventListener('click', () => {
    const cmd = btn.dataset.command;
    transcriptMessage.textContent = responses[cmd] ? responses[cmd]() : '';
    transcriptBox.classList.add('active');
    document.querySelector('.transcript-placeholder').style.display = 'none';
    if (responses[cmd]) speak(responses[cmd]());
  });
});

// Continuous listen toggle
document.getElementById('listenBtn').addEventListener('click', toggleContinuousListening);

// Click on robot face triggers a greeting
robotContainer.addEventListener('click', () => {
  const msgs = [
    'Efendim? Seni dinliyorum.',
    'Buyur? Nasıl yardımcı olabilirim?',
    'Merhaba! Bir şey mi söylemek istedin?'
  ];
  const msg = msgs[Math.floor(Math.random() * msgs.length)];
  transcriptMessage.textContent = msg;
  transcriptBox.classList.add('active');
  document.querySelector('.transcript-placeholder').style.display = 'none';
  speak(msg);
});

console.log('✦ Ariana — 7/24 Ses Asistanı Aktif ✦');
</script>
