<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ariana</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100vh; overflow: hidden; background: #000000; }

body {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* Scan lines overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 20;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.008) 2px,
    rgba(255,255,255,0.008) 3px
  );
  pointer-events: none;
}

/* Vignette */
.vignette {
  position: fixed;
  inset: 0;
  z-index: 15;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
  pointer-events: none;
}

/* ===== CENTER CONTAINER ===== */
.center {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
}

/* ===== MAIN GLOW BACKGROUND ===== */
.glow-bg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 70vmin;
  height: 70vmin;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(168, 85, 247, 0.2) 0%, rgba(168, 85, 247, 0.06) 30%, transparent 65%);
  filter: blur(60px);
  animation: bg-pulse 6s ease-in-out infinite;
}

@keyframes bg-pulse {
  0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
}

/* ===== RINGS ===== */
.ring {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  pointer-events: none;
}

.ring-1 {
  width: 62vmin;
  height: 62vmin;
  border: 1px solid rgba(168, 85, 247, 0.15);
  animation: ring-spin 30s linear infinite;
}

.ring-2 {
  width: 52vmin;
  height: 52vmin;
  border: 0.5px solid rgba(168, 85, 247, 0.1);
  animation: ring-spin-rev 25s linear infinite;
}

.ring-3 {
  width: 44vmin;
  height: 44vmin;
  border: 1.5px solid rgba(168, 85, 247, 0.12);
  animation: ring-spin 20s linear infinite;
}

.ring-4 {
  width: 34vmin;
  height: 34vmin;
  border: 0.5px solid rgba(168, 85, 247, 0.08);
  animation: ring-spin-rev 18s linear infinite;
}

.ring-5 {
  width: 22vmin;
  height: 22vmin;
  border: 2px solid rgba(168, 85, 247, 0.25);
  box-shadow: 0 0 30px rgba(168, 85, 247, 0.1), inset 0 0 30px rgba(168, 85, 247, 0.05);
  animation: ring-breathe 4s ease-in-out infinite;
}

.ring-6 {
  width: 10vmin;
  height: 10vmin;
  border: 1px solid rgba(168, 85, 247, 0.2);
  animation: ring-breathe 4s ease-in-out infinite 0.5s;
}

@keyframes ring-spin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

@keyframes ring-spin-rev {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(-360deg); }
}

@keyframes ring-breathe {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
  50% { transform: translate(-50%, -50%) scale(1.03); opacity: 1; }
}

/* ===== DASHED RING ===== */
.ring-dashed {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 56vmin;
  height: 56vmin;
  border-radius: 50%;
  border: 0.8px dashed rgba(168, 85, 247, 0.12);
  animation: ring-spin-rev 35s linear infinite;
  pointer-events: none;
}

/* ===== GLOWING DOT RING ===== */
.dot-ring {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 53vmin;
  height: 53vmin;
  border-radius: 50%;
  pointer-events: none;
  animation: ring-spin 15s linear infinite;
}

.dot {
  position: absolute;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: rgba(168, 85, 247, 0.4);
}

/* 12 dots around the ring */
.dot:nth-child(1) { top: 0; left: 50%; transform: translate(-50%, -50%); }
.dot:nth-child(2) { top: 25%; left: 93.3%; transform: translate(-50%, -50%); }  /* 30deg */
.dot:nth-child(3) { top: 75%; left: 93.3%; transform: translate(-50%, -50%); }  /* 60deg */
.dot:nth-child(4) { top: 100%; left: 50%; transform: translate(-50%, -50%); }
.dot:nth-child(5) { top: 75%; left: 6.7%; transform: translate(-50%, -50%); }
.dot:nth-child(6) { top: 25%; left: 6.7%; transform: translate(-50%, -50%); }

/* Extra dots at 45deg intervals */
.dot:nth-child(7) { top: 6.7%; left: 75%; transform: translate(-50%, -50%); }
.dot:nth-child(8) { top: 6.7%; left: 25%; transform: translate(-50%, -50%); }
.dot:nth-child(9) { top: 93.3%; left: 75%; transform: translate(-50%, -50%); }
.dot:nth-child(10) { top: 93.3%; left: 25%; transform: translate(-50%, -50%); }
.dot:nth-child(11) { top: 50%; left: 100%; transform: translate(-50%, -50%); }
.dot:nth-child(12) { top: 50%; left: 0%; transform: translate(-50%, -50%); }

/* ===== TICK MARKS ===== */
.tick-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 46vmin;
  height: 46vmin;
  border-radius: 50%;
  pointer-events: none;
}

.tick {
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 1.5px;
  height: 6px;
  background: rgba(168, 85, 247, 0.2);
  transform-origin: 50% 23vmin;
}

/* ===== HORIZONTAL & VERTICAL LINES ===== */
.cross-line {
  position: absolute;
  background: rgba(168, 85, 247, 0.06);
  pointer-events: none;
}

.cross-line-h {
  top: 50%;
  left: 0;
  right: 0;
  height: 0.5px;
  transform: translateY(-50%);
}

.cross-line-v {
  top: 0;
  bottom: 0;
  left: 50%;
  width: 0.5px;
  transform: translateX(-50%);
}

/* ===== CORNER ACCENTS ===== */
.corner-accent {
  position: fixed;
  z-index: 12;
  pointer-events: none;
}

.corner-accent-tl { top: 3vmin; left: 3vmin; }
.corner-accent-tr { top: 3vmin; right: 3vmin; }
.corner-accent-bl { bottom: 3vmin; left: 3vmin; }
.corner-accent-br { bottom: 3vmin; right: 3vmin; }

.corner-accent svg { width: 6vmin; height: 6vmin; }

/* ===== SIDE GLOWS ===== */
.side-glow {
  position: absolute;
  width: 1px;
  height: 20vmin;
  background: linear-gradient(to bottom, transparent, rgba(168, 85, 247, 0.15), transparent);
  pointer-events: none;
}

.side-glow-l { left: 8vmin; top: 50%; transform: translateY(-50%); }
.side-glow-r { right: 8vmin; top: 50%; transform: translateY(-50%); }

/* ===== DIGITAL LINE TOP/BOTTOM ===== */
.digital-line {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 30vmin;
  height: 0.5px;
  background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.15), transparent);
  pointer-events: none;
}

.digital-line-t { top: 22%; }
.digital-line-b { bottom: 22%; }

/* ===== SCANNER ARC ===== */
.scanner-arc {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 60vmin;
  height: 60vmin;
  border-radius: 50%;
  pointer-events: none;
  overflow: hidden;
}

.scanner-arc::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 100%;
  height: 100%;
  background: conic-gradient(from 0deg, transparent 0deg, rgba(168, 85, 247, 0.04) 10deg, transparent 20deg);
  animation: scanner-sweep 4s linear infinite;
  border-radius: 50%;
}

@keyframes scanner-sweep {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* ===== ARIANA TEXT ===== */
.ariana-text {
  position: relative;
  z-index: 10;
  text-align: center;
  line-height: 1;
  pointer-events: none;
}

.name-main {
  font-family: 'Courier New', monospace;
  font-size: clamp(2.5rem, 10vw, 7rem);
  font-weight: 700;
  letter-spacing: 0.5em;
  color: #ffffff;
  text-shadow:
    0 0 10px rgba(168, 85, 247, 0.8),
    0 0 30px rgba(168, 85, 247, 0.5),
    0 0 60px rgba(168, 85, 247, 0.3),
    0 0 120px rgba(168, 85, 247, 0.15);
  animation: text-glow 4s ease-in-out infinite;
  margin-right: -0.5em;
}

@keyframes text-glow {
  0%, 100% { text-shadow: 0 0 10px rgba(168, 85, 247, 0.8), 0 0 30px rgba(168, 85, 247, 0.5), 0 0 60px rgba(168, 85, 247, 0.3), 0 0 120px rgba(168, 85, 247, 0.15); }
  50% { text-shadow: 0 0 15px rgba(168, 85, 247, 1), 0 0 40px rgba(168, 85, 247, 0.7), 0 0 80px rgba(168, 85, 247, 0.4), 0 0 160px rgba(168, 85, 247, 0.2); }
}

.name-sub {
  font-family: 'Courier New', monospace;
  font-size: clamp(0.5rem, 1.8vw, 1rem);
  font-weight: 300;
  letter-spacing: 0.8em;
  color: rgba(168, 85, 247, 0.4);
  margin-top: 0.75rem;
  margin-right: -0.8em;
  text-transform: uppercase;
}

/* ===== UNDERLINE GLOW ===== */
.underline {
  width: 0;
  height: 1.5px;
  background: rgba(168, 85, 247, 0.6);
  margin: 1.2rem auto 0;
  box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
  animation: line-expand 3s ease-out infinite alternate;
}

@keyframes line-expand {
  0% { width: 0; opacity: 0; }
  50% { width: 15vmin; opacity: 1; }
  100% { width: 10vmin; opacity: 0.6; }
}

/* ===== SPARKLE PARTICLES ===== */
.sparkle {
  position: fixed;
  z-index: 5;
  width: 2px;
  height: 2px;
  border-radius: 50%;
  background: rgba(168, 85, 247, 0.3);
  pointer-events: none;
  animation: sparkle-float 8s linear infinite;
}

.sparkle:nth-child(1) { top: 15%; left: 20%; animation-delay: 0s; animation-duration: 7s; }
.sparkle:nth-child(2) { top: 80%; left: 85%; animation-delay: 1s; animation-duration: 9s; }
.sparkle:nth-child(3) { top: 30%; left: 75%; animation-delay: 2s; animation-duration: 6s; }
.sparkle:nth-child(4) { top: 70%; left: 10%; animation-delay: 3s; animation-duration: 8s; }
.sparkle:nth-child(5) { top: 50%; left: 95%; animation-delay: 0.5s; animation-duration: 7.5s; }
.sparkle:nth-child(6) { top: 10%; left: 60%; animation-delay: 1.5s; animation-duration: 6.5s; }
.sparkle:nth-child(7) { top: 90%; left: 40%; animation-delay: 2.5s; animation-duration: 8.5s; }
.sparkle:nth-child(8) { top: 40%; left: 5%; animation-delay: 3.5s; animation-duration: 7s; }
.sparkle:nth-child(9) { top: 60%; left: 50%; animation-delay: 0.8s; animation-duration: 9.5s; }
.sparkle:nth-child(10) { top: 20%; left: 40%; animation-delay: 1.8s; animation-duration: 6s; }

@keyframes sparkle-float {
  0% { opacity: 0; transform: translate(0, 0) scale(1); }
  20% { opacity: 0.8; }
  80% { opacity: 0.8; }
  100% { opacity: 0; transform: translate(30px, -30px) scale(0.5); }
}

/* ===== INTERFERENCE / NOISE ===== */
.noise {
  position: fixed;
  inset: 0;
  z-index: 25;
  pointer-events: none;
  opacity: 0.015;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .ring-1 { width: 80vmin; height: 80vmin; }
  .ring-2 { width: 68vmin; height: 68vmin; }
  .ring-3 { width: 56vmin; height: 56vmin; }
  .ring-5 { width: 28vmin; height: 28vmin; }
  .side-glow { display: none; }
  .tick-container { width: 58vmin; height: 58vmin; }
  .tick { transform-origin: 50% 29vmin; }
}
</style>
</head>
<body>

<div class="vignette"></div>
<div class="noise"></div>

<!-- Sparkles -->
<div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
<div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
<div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div>
<div class="sparkle"></div>

<!-- Corner accents -->
<svg class="corner-accent corner-accent-tl" viewBox="0 0 60 60" fill="none">
  <path d="M0 0h50M0 0v50" stroke="rgba(168,85,247,0.15)" stroke-width="1"/>
  <circle cx="50" cy="50" r="1.5" fill="rgba(168,85,247,0.3)"/>
</svg>
<svg class="corner-accent corner-accent-tr" viewBox="0 0 60 60" fill="none">
  <path d="M60 0H10M60 0v50" stroke="rgba(168,85,247,0.15)" stroke-width="1"/>
  <circle cx="10" cy="50" r="1.5" fill="rgba(168,85,247,0.3)"/>
</svg>
<svg class="corner-accent corner-accent-bl" viewBox="0 0 60 60" fill="none">
  <path d="M0 60h50M0 60V10" stroke="rgba(168,85,247,0.15)" stroke-width="1"/>
  <circle cx="50" cy="10" r="1.5" fill="rgba(168,85,247,0.3)"/>
</svg>
<svg class="corner-accent corner-accent-br" viewBox="0 0 60 60" fill="none">
  <path d="M60 60H10M60 60V10" stroke="rgba(168,85,247,0.15)" stroke-width="1"/>
  <circle cx="10" cy="10" r="1.5" fill="rgba(168,85,247,0.3)"/>
</svg>

<div class="center">
  <div class="glow-bg"></div>

  <div class="cross-line cross-line-h"></div>
  <div class="cross-line cross-line-v"></div>

  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring-dashed"></div>
  <div class="ring ring-3"></div>

  <div class="dot-ring">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <div class="ring ring-4"></div>

  <div class="tick-container" id="tickContainer"></div>

  <div class="ring ring-5"></div>

  <div class="scanner-arc"></div>

  <div class="digital-line digital-line-t"></div>
  <div class="digital-line digital-line-b"></div>

  <div class="side-glow side-glow-l"></div>
  <div class="side-glow side-glow-r"></div>

  <div class="ring ring-6"></div>

  <div class="ariana-text">
    <div class="name-main">ARIANA</div>
    <div class="name-sub">v3.0 // neural interface</div>
    <div class="underline"></div>
  </div>
</div>

<script>
// Generate tick marks around the circle
const container = document.getElementById('tickContainer');
const ticks = 24;
for (let i = 0; i < ticks; i++) {
  const tick = document.createElement('div');
  tick.className = 'tick';
  const angle = (i / ticks) * 360;
  const size = i % 4 === 0 ? 10 : (i % 2 === 0 ? 6 : 4);
  tick.style.height = size + 'px';
  tick.style.background = i % 4 === 0 ? 'rgba(168, 85, 247, 0.3)' : 'rgba(168, 85, 247, 0.12)';
  tick.style.transform = `translateX(-50%) rotate(${angle}deg)`;
  tick.style.transformOrigin = '50% 23vmin';
  container.appendChild(tick);
}
</script>
</body>
</html>
